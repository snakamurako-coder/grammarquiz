<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BrightStage</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

  <!-- Login Screen -->
  <div id="login-screen">
    <div class="header-title">BrightStage ログイン</div>
    <div class="setting-section" style="text-align: center; padding: 40px 10px;">
      <p style="margin-bottom: 20px; font-size: 1.1em; color: #555;">システムを利用するにはGoogleアカウント認証が必要です。</p>
      
      <!-- Googleログインボタン -->
      <div id="g_id_onload"
         data-client_id="505252303455-84r495bnnsgiefcrv24ro2qtohlgbk2h.apps.googleusercontent.com"
         data-context="signin"
         data-ux_mode="popup"
         data-callback="handleCredentialResponse"
         data-auto_prompt="false">
      </div>
      <div class="g_id_signin"
         data-type="standard"
         data-shape="rectangular"
         data-theme="outline"
         data-text="signin_with"
         data-size="large"
         data-logo_alignment="left"
         style="display: flex; justify-content: center;">
      </div>
      <div id="login-msg" style="margin-top: 15px; color: #f44336; font-weight: bold;"></div>
    </div>
  </div>

  <!-- Game Settings & Modes -->
  <div id="settings-screen" style="display: none;">
    <div class="header-title">BrightStage 学習設定</div>

    <div class="setting-section" id="profile-container">
      <div class="section-title">0. ユーザー情報（認証済み）</div>
      <div style="background-color: #f5f5f5; border: 1px solid #ccc; border-radius: 6px; padding: 10px; font-size: 1.1em; text-align: left; position: relative;">
        <div style="margin-bottom: 5px;"><strong>氏名: </strong><span id="profile-name"></span></div>
        <div style="margin-bottom: 5px;"><strong>学年: </strong><span id="profile-grade"></span></div>
        <div style="margin-bottom: 5px;"><strong>クラス: </strong><span id="profile-class"></span></div>
        <div style="font-size: 0.9em; color: #666; margin-top: 8px;"><strong>アカウント: </strong><span id="profile-account"></span></div>
        <button id="logout-btn" class="btn-small" style="position: absolute; bottom: 10px; right: 10px; padding: 5px 10px; font-size: 0.8em; background-color: #f44336; border: none; color: white; border-radius: 4px; cursor: pointer;">ログアウト</button>
      </div>
      <input type="hidden" id="username-input">
    </div>
    
    <!-- 新設：マイページ（ダッシュボード） -->
    <div class="setting-section" id="mypage-container" style="display: none;">
      <div class="section-title">📊 マイページ（学習記録）</div>
      <div class="dashboard-grid">
        <!-- 弱点分析 -->
        <div class="dashboard-card weakness-card">
          <div class="card-title">🚨 優先して復習すべきセット</div>
          <div id="weakness-list" class="dashboard-content">読込中...</div>
        </div>
        <!-- 最近の学習履歴 -->
        <div class="dashboard-card recent-card">
          <div class="card-title">🕒 最近の学習履歴 (直近5回)</div>
          <div id="recent-history-list" class="dashboard-content">読込中...</div>
        </div>
        <!-- セット別進捗 -->
        <div class="dashboard-card progress-card">
          <div class="card-title">📈 学習セット別の進捗</div>
          <div id="set-progress-list" class="dashboard-content">読込中...</div>
        </div>
      </div>
    </div>
    
    <div class="setting-section">
      <div class="section-title">1. 学年・科目</div>
      <div class="form-group">
        <select id="subject-select">
          <option value="jhs1">中学1年 英語</option>
          <option value="jhs2">中学2年 英語</option>
        </select>
      </div>
    </div>
    <div class="setting-section">
      <div class="section-title">2. 単元を選択</div>
      <div class="unit-grid" id="unit-container"></div>
    </div>
    <div class="setting-section">
      <div class="section-title">3. 詳細オプション</div>
      <div class="check-list">
        <label class="check-item"><input type="checkbox" id="dummy-option" checked> [上級] ダミー（不要語）を混入する</label>
      </div>
    </div>
    <div class="setting-section">
      <div class="section-title">4. 出題モード</div>
      <div class="check-list">
        <label class="check-item"><input type="radio" name="play-mode" value="normal" checked> 順番通り（選択した全問）</label>
        <label class="check-item"><input type="radio" name="play-mode" value="random10"> ランダム演習（10問）</label>
        <label class="check-item"><input type="radio" name="play-mode" value="weakness"> 苦手克服優先（10問）</label>
        <label class="check-item"><input type="radio" name="play-mode" value="unseen"> 未定着優先（10問）</label>
      </div>
    </div>
    <button id="start-btn" class="btn-primary">学習を開始する</button>
  </div>

  <!-- Game Screen -->
  <div id="game-screen" style="display: none;">
    <button id="back-btn" class="btn-small" style="margin-bottom: 10px;">← 設定に戻る</button>
    <div class="question-box">
      <div class="question-ja" id="question-ja"></div>
    </div>

    <!-- Missing Word Input Area -->
    <div id="missing-word-input-area">
      <div class="input-label">不足語:</div>
      <div id="missing-word-display" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"></div>
      <button id="create-card-btn" disabled>カードを作成</button>
    </div>

    <!-- 並び替え用 UI -->
    <div id="sort-ui" style="display:none;">
      <div class="area-header">
        <div class="area-label">▼ 回答欄（並べてください）</div>
      </div>
      <div id="sentence-container">
        <span id="prefix-text" class="fixed-text"></span>
        <div id="answer-slot" class="sortable-area"></div>
        <span id="suffix-text" class="fixed-text"></span>
      </div>
      <div class="area-header">
        <div class="area-label">▼ 仮置き場</div>
        <button id="move-all-btn" class="btn-small">↑ 流し込む</button>
      </div>
      <div id="word-pool" class="sortable-area"></div>
      <div class="area-header">
        <div class="area-label">▼ 除外置き場</div>
      </div>
      <div id="trash-slot" class="sortable-area"></div>
      <button id="submit-btn" style="display: none; width: 100%; padding: 15px; font-size: 1.2em; background-color: #4caf50; color: white; border: none; border-radius: 8px; cursor: pointer; margin-top: 10px;">これで回答する</button>
    </div>

    <!-- 4択問題用 UI -->
    <div id="choice-ui" style="display:none;">
      <div id="choice-sentence-container" class="sentence-container fixed-text" style="display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px;"></div>
      <div id="choice-buttons-container" class="choices-grid"></div>
    </div>

    <!-- タイピング（和文英訳・空所）用 UI -->
    <div id="typing-ui" style="display:none;">
      <div id="typing-sentence-container" class="sentence-container fixed-text" style="display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px;"></div>
      <div id="typing-input-display" class="typing-display" style="min-height: 40px; padding: 10px; border: 2px solid #ccc; border-radius: 4px; background-color: #fff; cursor: pointer; font-size: 1.2em; margin-bottom: 15px;">タップして入力</div>
      <button id="typing-submit-btn" style="display: none; width: 100%; padding: 15px; font-size: 1.2em; background-color: #4caf50; color: white; border: none; border-radius: 8px; cursor: pointer; margin-top: 10px;">これで回答する</button>
    </div>

    <div id="result-msg"></div>
    <button id="next-btn" class="btn-primary" style="display: none; margin-top: 15px;">次の問題へ進む</button>
  </div>

  <!-- Result Screen -->
  <div id="result-screen" style="display: none; text-align: center;">
    <div class="header-title">リザルト</div>
    <div class="setting-section">
      <h2 id="result-score" style="font-size: 2em; color: #2196f3; margin-bottom: 20px;"></h2>
      <p id="result-details" style="font-size: 1.1em; color: #555; margin-bottom: 20px;"></p>
    </div>
    <button id="return-settings-btn" class="btn-primary">学習設定に戻る</button>
  </div>

  <div id="keyboard-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
  <script src="algorithm.js"></script>
  <script src="choice.js"></script>
  <script src="typing.js"></script>
  <script src="sorting.js"></script>
  <script src="keyboard.js"></script>
  <script src="authService.js"></script>
  <script src="app.js"></script>
</body>
</html>
