    function renderUnits(subject) {
      elements.units.innerHTML = '';

        lbl.className = 'unit-card selected';
        lbl.innerHTML = `<input type="checkbox" value="${unit}" checked style="display:none;"> ${unit}`;

      loadMockQuestion();
      screens.settings.style.display = 'none';
      screens.game.style.display = 'block';
    });
    elements.backBtn.addEventListener('click', () => {
      screens.game.style.display = 'none';
      screens.settings.style.display = 'block';
    });

      currentQuestionData = {
        japanese: "私が議長に最適だと思うのはジョンです。(欠損: think)",

        correct_answer: "think the best person for chairperson",
        all_correct_words: ["think", "the", "best", "person", "for", "chairperson"],

        dummies: document.getElementById('dummy-option').checked ? ["a"] : []
      };
      
      elements.qJa.textContent = currentQuestionData.japanese;
      const match = currentQuestionData.sentence_template.match(/[(\[（［<＜][^)\]）］>＞]*[)\]）］>＞]/);
      elements.prefix.textContent = match ? currentQuestionData.sentence_template.substring(0, match.index).trim() : "";
      elements.suffix.textContent = match ? currentQuestionData.sentence_template.substring(match.index + match[0].length).trim() : "";

      elements.answer.innerHTML = ''; elements.pool.innerHTML = ''; elements.trash.innerHTML = '';
      let initialPool = [...currentQuestionData.pool_words, ...currentQuestionData.dummies];
      initialPool.sort(() => Math.random() - 0.5);
      initialPool.forEach(w => createCard(w, elements.pool));
      checkSubmitVisibility();
    }

    function createCard(text, container) {
      const card = document.createElement('div');
      card.className = 'word-card'; card.textContent = text;
      container.appendChild(card);
    }

    const sortOptions = { group: 'shared', animation: 150, ghostClass: 'sortable-ghost', onSort: checkSubmitVisibility };
    new Sortable(elements.answer, sortOptions);
    new Sortable(elements.pool, sortOptions);
    new Sortable(elements.trash, sortOptions);

    function checkSubmitVisibility() {
      elements.submit.style.display = (elements.answer.children.length === currentQuestionData.all_correct_words.length) ? 'block' : 'none';
      elements.result.textContent = "";
    }

    document.getElementById('move-all-btn').addEventListener('click', () => {
      Array.from(elements.pool.children).forEach(c => elements.answer.appendChild(c));
      checkSubmitVisibility();
    });

    elements.submit.addEventListener('click', () => {
      const userAns = Array.from(elements.answer.children).map(c => c.textContent).join(' ');
      if (userAns === currentQuestionData.correct_answer) {
        elements.result.textContent = "⭕️ 正解！"; elements.result.style.color = "#4caf50";
      } else {
        elements.result.textContent = "❌ 惜しい！"; elements.result.style.color = "#f44336";
      }
    });

    // -----------------------------------------
    // キーボードロジック（簡略化）
    // -----------------------------------------
    let currentInput = "";
    elements.missDisplay.addEventListener('click', e => { elements.kb.style.display = 'block'; e.stopPropagation(); });
    document.body.addEventListener('click', e => {
      if (!e.target.closest('#missing-word-input-area') && !e.target.closest('#keyboard-container')) elements.kb.style.display = 'none';
    });
    
    elements.createBtn.addEventListener('click', () => {
      if (!currentInput) return;
      createCard(currentInput, elements.pool);
      currentInput = ""; elements.missDisplay.textContent = ""; elements.createBtn.disabled = true;
      elements.kb.style.display = 'none'; checkSubmitVisibility();
    });

    // ※今回はプロトタイプ統合のため、枠組みだけ設置しています。前回のコードをそのまま挿入可能です。

  </script>

    function renderKeyboard() {
      kbContainer.innerHTML = ''; 
      const rows = (shiftState > 0) ? keyLayout.shifted : keyLayout.normal;

      rows.forEach((row) => {
        const rowDiv = document.createElement('div');
        rowDiv.className = 'keyboard-row';
        
        row.forEach(key => {
          const keyBtn = document.createElement('button');
          keyBtn.className = 'key';
          
          // 表示テキストの調整
          if (key === "Back") keyBtn.textContent = "⌫";
          else if (key === "Space") keyBtn.textContent = "空白"; // 表示は空白でもOK
          else keyBtn.textContent = key;

          // 特殊キーのスタイル調整
          if (key === "Shift") {
            keyBtn.classList.add('wide');
            if (shiftState === 1) keyBtn.classList.add('activated');
            if (shiftState === 2) keyBtn.innerHTML = '⬆️<span style="font-size:0.6em">LOCK</span>';
          }
          if (key === "Back") keyBtn.classList.add('wide');
          if (key === "Space") keyBtn.classList.add('space');
          if (key === "Enter") keyBtn.classList.add('enter');

          // 【修正箇所】タップ時のイベント
          keyBtn.addEventListener('pointerdown', (e) => {
            e.preventDefault(); 
            handleKeyPress(key);
          });

          rowDiv.appendChild(keyBtn);
        });
        kbContainer.appendChild(rowDiv);
      });
    }

    function handleKeyPress(key) {
      if (key === "Shift") {
        handleShiftLogic();
      } else if (key === "Back") {
        currentInput = currentInput.slice(0, -1);
      } else if (key === "Space") {
        currentInput += " "; // スペースを追加
      } else if (key === "Enter") {
        // Enterを押した場合は「カードを作成」ボタンをクリックした扱いにする
        if(currentInput.length > 0) {
          createCardBtn.click();
        }
        return; // Enterの後は文字追加等の処理をしない
      } else {
        currentInput += key;
        if (shiftState === 1) shiftState = 0;
      }
      updateInputDisplay();
      renderKeyboard(); 
    }

    function updateInputDisplay() {
      missingWordDisplay.textContent = currentInput;
      createCardBtn.disabled = (currentInput.length === 0);
    }

    function handleShiftLogic() {
      const now = Date.now();
      const timeDiff = now - lastShiftClickTime;
      if (timeDiff < 300) shiftState = 2;
      else shiftState = (shiftState === 0) ? 1 : 0;
      lastShiftClickTime = now;
    }

    renderKeyboard();

    //========================================
    // 4. 物理キーボードのフック
    //========================================
    window.addEventListener('keydown', (e) => {
      if (kbContainer.style.display === 'none') return;
      
      let pressedKey = e.key;
      e.preventDefault(); // デフォルトの入力をキャンセル

      if (pressedKey === "Backspace") pressedKey = "Back";
      if (pressedKey === "Shift") pressedKey = "Shift";
      if (pressedKey === " ") pressedKey = "Space";
      if (pressedKey === "Enter") pressedKey = "Enter";

      const allKeysNormal = keyLayout.normal.flat();
      const allKeysShifted = keyLayout.shifted.flat();
      
      if (allKeysNormal.includes(pressedKey) || allKeysShifted.includes(pressedKey)) {
        handleKeyPress(pressedKey);
      }
    });

  </script>
